<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOOM | SpinnerRealYT Games</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        :root {
            --bg: #020617;
            --accent: #38bdf8;
            --panel-bg: #0f172a;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg);
            color: white; font-family: 'Inter', sans-serif;
            overflow: hidden; display: flex;
        }

        /* Kontener Gry */
        .game-container {
            flex-grow: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        #canvas {
            max-width: 100%;
            max-height: 80vh;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            cursor: crosshair;
        }

        /* Panel boczny (Info) */
        .main-panel {
            width: 300px;
            max-width: 300px;
            height: 100%;
            background: var(--panel-bg);
            border-left: 1px solid rgba(56, 189, 248, 0.2);
            transition: 0.3s;
            position: relative;
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .main-panel-content {
            padding: 20px;
            overflow-y: auto;
        }

        .hide-main-panel {
            position: absolute;
            left: -40px;
            top: 20px;
            width: 40px;
            height: 40px;
            background: var(--panel-bg);
            border: 1px solid rgba(56, 189, 248, 0.2);
            border-right: none;
            color: var(--accent);
            cursor: pointer;
            border-radius: 8px 0 0 8px;
            font-weight: bold;
        }

        /* Status ładowania */
        .loader-overlay {
            position: absolute;
            inset: 0;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 50;
        }

        .progress-bar {
            width: 200px;
            height: 4px;
            background: #1e293b;
            border-radius: 2px;
            margin-top: 15px;
            overflow: hidden;
        }

        #progress-fill {
            width: 0%;
            height: 100%;
            background: var(--accent);
            transition: 0.3s;
        }

        .controls-hint {
            margin-top: 20px;
            font-size: 13px;
            color: #94a3b8;
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 8px;
        }

        kbd {
            background: #334155;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
            color: white;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div id="loader" class="loader-overlay">
            <img src="../Logo.png" alt="Logo" style="height: 50px; margin-bottom: 20px;">
            <div id="status-text">Inicjalizacja MS-DOS...</div>
            <div class="progress-bar"><div id="progress-fill"></div></div>
        </div>

        <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>
        
        <div style="margin-top: 15px;">
            <button onclick="Module.requestFullScreen(false, false)" style="background: var(--accent); border:none; padding: 8px 20px; border-radius: 8px; cursor:pointer; font-weight:bold;">PEŁNY EKRAN</button>
        </div>
    </div>

    <div class="main-panel">
        <button class="hide-main-panel"> >> </button>
        <div class="main-panel-content">
            <h2 style="color:var(--accent); margin-top:0;">DOOM (1993)</h2>
            <p style="font-size: 14px; color: #cbd5e1;">Legendarna strzelanka FPS, która zdefiniowała gatunek. Walcz z demonami na Marsie.</p>
            
            <div class="controls-hint">
                <strong>STEROWANIE:</strong><br><br>
                <kbd>Strzałki</kbd> - Poruszanie<br>
                <kbd>Ctrl</kbd> - Strzał<br>
                <kbd>Spacja</kbd> - Otwórz drzwi<br>
                <kbd>Alt</kbd> - Strafe (bok)<br>
                <kbd>1-7</kbd> - Zmiana broni
            </div>

            <div style="margin-top: 20px; border-top: 1px solid #334155; padding-top: 20px;">
                <p style="font-size: 12px; color: #64748b;">Zalogowany jako: <span id="user-display" style="color:var(--accent)">Gość</span></p>
                <button onclick="location.href='../index.html'" style="width:100%; background:none; border: 1px solid #334155; color: white; padding: 8px; border-radius: 8px; cursor:pointer;">Powrót do menu</button>
            </div>
        </div>
    </div>

    <script type='text/javascript'>
        // Pobieranie nicku z localStorage
        document.getElementById('user-display').textContent = localStorage.getItem("sp_logged") || "Gość";

        // Toggle Panelu
        $('.hide-main-panel').click(function() {
            const panel = $('.main-panel');
            if (panel.css('width') !== '0px') {
                panel.css('width', '0px');
                $(this).html('Info');
            } else {
                panel.css('width', '300px');
                $(this).html('>>');
            }
        });

        var Module = {
            canvas: document.getElementById('canvas'),
            setStatus: function(text) {
                document.getElementById('status-text').innerText = text;
                var m = text.match(/(\d+)\/(\d+)/);
                if (m) {
                    var percent = Math.round(parseInt(m[1]) / parseInt(m[2]) * 100);
                    document.getElementById('progress-fill').style.width = percent + "%";
                }
            },
            monitorRunDependencies: function(left) {
                if (left === 0) {
                    document.getElementById('loader').style.display = 'none';
                }
            }
        };

        // Ładowanie silnika i gry
        window.onload = function() {
            const script = document.createElement('script');
            script.src = "https://js-dos.com/dosbox.js";
            script.onload = () => {
                // Konfiguracja plików gry (Doom.exe.data z Twojego kodu)
                (function() {
                    var PACKAGE_PATH = "https://js-dos.com/games/";
                    var REMOTE_PACKAGE_NAME = PACKAGE_PATH + 'doom.exe.data';
                    var REMOTE_PACKAGE_SIZE = 13731014;

                    Module['arguments'] = [ '-conf', './dosbox.conf', './DOOM.EXE' ];
                    
                    fetch(REMOTE_PACKAGE_NAME).then(res => res.arrayBuffer()).then(data => {
                        Module.removeRunDependency = (id) => { if(id.includes('datafile')) document.getElementById('loader').style.display = 'none'; };
                        Module.addRunDependency = (id) => {};
                        // Tutaj js-dos automatycznie zajmie się resztą przez FS_createPreloadedFile
                    });
                })();
            };
            document.body.appendChild(script);
        };
    </script>
</body>
</html>
