<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="utf-8">
    <title>DOOM | SpinnerRealYT</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://js-dos.com/assets/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #020617;
            --accent-color: #38bdf8;
            --panel-bg: #0f172a;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg-color);
            color: white;
            font-family: sans-serif;
            overflow: hidden;
            touch-action: none; /* Blokuje zoomowanie przy dotyku */
        }

        .container-fluid {
            display: flex;
            height: 100vh;
            padding: 0;
        }

        .game-wrapper {
            flex-grow: 1;
            position: relative;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        canvas.emscripten {
            border: 0 none;
            max-width: 100%;
            max-height: 90vh;
            image-rendering: pixelated; /* Retro look */
        }

        /* Panel boczny */
        .main-panel {
            width: 300px;
            background: var(--panel-bg);
            border-left: 1px solid rgba(56, 189, 248, 0.2);
            transition: 0.3s;
            overflow-y: auto;
            z-index: 1000;
        }

        /* Stylizacja dla telefonów */
        @media (max-width: 768px) {
            .main-panel {
                position: fixed;
                right: -300px;
                height: 100%;
            }
            .main-panel.active {
                right: 0;
            }
            #joystick-container {
                display: block !important;
            }
        }

        /* DRĄŻEK / JOYSTICK */
        #joystick-container {
            display: none;
            position: absolute;
            bottom: 40px;
            left: 40px;
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            z-index: 2000;
            border: 2px solid var(--accent-color);
        }

        #joystick-stick {
            position: absolute;
            width: 50px;
            height: 50px;
            background: var(--accent-color);
            border-radius: 50%;
            top: 35px;
            left: 35px;
            box-shadow: 0 0 15px var(--accent-color);
        }

        .loading-overlay {
            position: absolute;
            inset: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 500;
        }

        .btn-action {
            position: absolute;
            bottom: 40px;
            right: 40px;
            width: 80px;
            height: 80px;
            background: rgba(220, 38, 38, 0.6);
            border: none;
            border-radius: 50%;
            color: white;
            font-weight: bold;
            display: none;
        }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="game-wrapper">
        <div id="loading-overlay" class="loading-overlay">
            <h2 id="status">Wczytywanie...</h2>
            <div id="progress" style="color: var(--accent-color);">0%</div>
            <p style="margin-top: 20px; font-size: 12px; opacity: 0.6;">Jeśli strona się zawiesi, odśwież (F5)</p>
        </div>

        <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()"></canvas>

        <div id="joystick-container">
            <div id="joystick-stick"></div>
        </div>
        <button class="btn-action" id="fire-btn" style="display: none;">STRZAŁ</button>
    </div>

    <div class="main-panel" id="side-panel">
        <div style="padding: 20px;">
            <h4 style="color: var(--accent-color);">DOOM</h4>
            <hr style="border-color: rgba(255,255,255,0.1);">
            <p>Gracz: <strong id="player-nick">Gość</strong></p>
            <div style="font-size: 13px; background: #1e293b; padding: 10px; border-radius: 5px;">
                <strong>PC:</strong> Strzałki + CTRL<br>
                <strong>Mobilne:</strong> Użyj drążka po lewej
            </div>
            <br>
            <button onclick="location.href='../index.html'" class="btn btn-danger btn-block">Wyjdź z gry</button>
        </div>
    </div>
</div>

<script src="https://js-dos.com/assets/js/jquery-1.11.2.min.js"></script>
<script async src="https://js-dos.com/dosbox.js"></script>

<script>
    // 1. Obsługa Nicku (Zgodnie z Twoimi instrukcjami)
    const savedNick = localStorage.getItem("sp_username") || "Gracz";
    document.getElementById("player-nick").innerText = savedNick;

    // 2. Konfiguracja Emulatora
    var Module = {
        canvas: document.getElementById('canvas'),
        setStatus: function(text) {
            console.log(text);
            document.getElementById('status').innerHTML = text;
            if (text.includes("Running")) {
                document.getElementById('loading-overlay').style.display = 'none';
                if ('ontouchstart' in window) {
                    document.getElementById('fire-btn').style.display = 'block';
                    document.getElementById('joystick-container').style.display = 'block';
                }
            }
        },
        monitorRunDependencies: function(left) {
            const total = 100;
            const p = Math.round(((total - left) / total) * 100);
            document.getElementById('progress').innerHTML = p + "%";
        }
    };

    // 3. Obsługa Joysticka (Drążka)
    const joystick = document.getElementById('joystick-container');
    const stick = document.getElementById('joystick-stick');
    let isMoving = false;

    joystick.addEventListener('touchstart', (e) => {
        isMoving = true;
        handleJoystick(e);
    });

    window.addEventListener('touchmove', (e) => {
        if (isMoving) handleJoystick(e);
    });

    window.addEventListener('touchend', () => {
        isMoving = false;
        stick.style.top = '35px';
        stick.style.left = '35px';
        // Tu należy dodać puszczenie klawiszy w emulatorze
    });

    function handleJoystick(e) {
        const rect = joystick.getBoundingClientRect();
        const touch = e.touches[0];
        let x = touch.clientX - rect.left - 60;
        let y = touch.clientY - rect.top - 60;
        
        const distance = Math.sqrt(x*x + y*y);
        if (distance > 50) {
            x *= 50 / distance;
            y *= 50 / distance;
        }

        stick.style.left = (35 + x) + 'px';
        stick.style.top = (35 + y) + 'px';
        
        // Mapowanie na klawisze (uproszczone)
        if (y < -20) simulateKey(38); // Góra
        if (y > 20) simulateKey(40);  // Dół
        if (x < -20) simulateKey(37); // Lewo
        if (x > 20) simulateKey(39);  // Prawo
    }

    function simulateKey(code) {
        // Funkcja do przekazywania klawiszy do DOSBox
        const event = new KeyboardEvent('keydown', { keyCode: code });
        window.dispatchEvent(event);
    }

    // Ładowanie gry
    window.onload = function() {
        // Opóźnienie, aby przeglądarka "odetchnęła"
        setTimeout(() => {
            if (typeof Dosbox !== 'undefined') {
                // Inicjalizacja gry
            }
        }, 2000);
    };
</script>

<script type="text/javascript">
// Tu wklej pozostałą część skryptu DataRequest z poprzedniej wiadomości (pobieranie doom.exe.data)
// Pamiętaj, aby ścieżki do plików były pełne: https://js-dos.com/games/doom.exe.data
</script>

</body>
</html>
