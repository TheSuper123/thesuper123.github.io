<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="utf-8">
    <title>DOOM | SpinnerRealYT</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://js-dos.com/assets/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #020617;
            --accent-color: #38bdf8;
            --panel-bg: #0f172a;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg-color);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        .main-container {
            display: flex;
            width: 100vw;
            height: 100vh;
        }

        /* Kontener gry z Iframe */
        .game-wrapper {
            flex-grow: 1;
            position: relative;
            background: #000;
        }

        #game-frame {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* Panel boczny */
        .main-panel {
            width: 320px;
            background: var(--panel-bg);
            border-left: 1px solid rgba(56, 189, 248, 0.2);
            display: flex;
            flex-direction: column;
            transition: 0.3s;
            z-index: 100;
        }

        .main-panel-content {
            padding: 25px;
            overflow-y: auto;
            flex-grow: 1;
        }

        /* Drążek sterowniczy (Joystick) dla telefonów */
        #joystick-zone {
            position: absolute;
            bottom: 40px;
            left: 40px;
            width: 150px;
            height: 150px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            border: 2px solid var(--accent-color);
            display: none; /* Widoczne tylko na mobilkach via JS */
            touch-action: none;
        }

        #joystick-stick {
            position: absolute;
            width: 60px;
            height: 60px;
            background: var(--accent-color);
            border-radius: 50%;
            top: 45px;
            left: 45px;
            box-shadow: 0 0 20px var(--accent-color);
        }

        /* Personalizacja wyglądu na telefonach */
        @media (max-width: 768px) {
            .main-panel {
                position: fixed;
                right: -320px;
                height: 100%;
            }
            .main-panel.active {
                right: 0;
            }
            #joystick-zone {
                display: block;
            }
        }

        .user-badge {
            background: rgba(56, 189, 248, 0.1);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--accent-color);
            margin-bottom: 20px;
        }

        kbd {
            background: #1e293b;
            color: #38bdf8;
            border: 1px solid #334155;
            padding: 2px 4px;
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="game-wrapper">
        <iframe id="game-frame" src="doomfiles/DOOM_html/Titlescreen.html"></iframe>

        <div id="joystick-zone">
            <div id="joystick-stick"></div>
        </div>
    </div>

    <div class="main-panel" id="side-panel">
        <div class="main-panel-content">
            <h3 style="color: var(--accent-color); margin-top: 0;">DOOM PORTAL</h3>
            
            <div class="user-badge">
                <small style="display: block; opacity: 0.6;">Zalogowano jako:</small>
                <span id="display-name" style="font-weight: bold; font-size: 1.2em;">Wczytywanie...</span>
            </div>

            <div style="margin-bottom: 20px;">
                <strong>Sterowanie:</strong>
                <ul style="font-size: 0.9em; padding-left: 20px; margin-top: 10px;">
                    <li><kbd>WASD</kbd> / <kbd>Strzałki</kbd> - Ruch</li>
                    <li><kbd>CTRL</kbd> - Strzał</li>
                    <li><kbd>SPACE</kbd> - Akcja</li>
                </ul>
            </div>

            <button onclick="window.location.href='../index.html'" class="btn btn-block btn-primary">POWRÓT DO MENU</button>
            <hr style="border-color: rgba(255,255,255,0.1);">
            <button id="logout-btn" class="btn btn-block btn-danger" style="display:none;">WYLOGUJ</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>

<script>
    // 1. Konfiguracja Firebase (Wklej tutaj swoje dane z konsoli Firebase)
    const firebaseConfig = {
        apiKey: "TWOJE_API_KEY",
        authDomain: "TWOJE_PROJEKT.firebaseapp.com",
        projectId: "TWOJE_PROJEKT",
        storageBucket: "TWOJE_PROJEKT.appspot.com",
        messagingSenderId: "SENDER_ID",
        appId: "APP_ID"
    };
    
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // 2. Obsługa nicku i konta
    auth.onAuthStateChanged(user => {
        const nameDisplay = document.getElementById('display-name');
        const logoutBtn = document.getElementById('logout-btn');

        if (user) {
            // Jeżeli zalogowany, użyj nicku z konta
            nameDisplay.textContent = user.displayName || user.email;
            logoutBtn.style.display = 'block';
        } else {
            // Jeżeli nie zalogowany, sprawdź localStorage lub wpisz nick
            const localNick = localStorage.getItem("user_nick");
            if (localNick) {
                nameDisplay.textContent = localNick;
            } else {
                const guestNick = prompt("Podaj swój nick do gry:", "Gracz" + Math.floor(Math.random()*100));
                localStorage.setItem("user_nick", guestNick);
                nameDisplay.textContent = guestNick;
            }
            logoutBtn.style.display = 'none';
        }
    });

    // Wylogowanie
    document.getElementById('logout-btn').onclick = () => auth.signOut();

    // 3. Logika Drążka (Joystick)
    const joystick = document.getElementById('joystick-zone');
    const stick = document.getElementById('joystick-stick');
    let active = false;

    if ('ontouchstart' in window) {
        joystick.style.display = 'block';
    }

    joystick.addEventListener('touchstart', e => { active = true; handleMove(e); });
    window.addEventListener('touchend', () => { 
        active = false; 
        stick.style.transform = 'translate(0,0)';
        // Wysyłaj puste komendy do iframe, żeby postać się zatrzymała
        document.getElementById('game-frame').contentWindow.postMessage({type: 'stop'}, '*');
    });
    window.addEventListener('touchmove', e => { if(active) handleMove(e); });

    function handleMove(e) {
        const rect = joystick.getBoundingClientRect();
        const touch = e.touches[0];
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        
        let deltaX = touch.clientX - centerX;
        let deltaY = touch.clientY - centerY;
        
        const distance = Math.min(60, Math.sqrt(deltaX**2 + deltaY**2));
        const angle = Math.atan2(deltaY, deltaX);
        
        const moveX = Math.cos(angle) * distance;
        const moveY = Math.sin(angle) * distance;
        
        stick.style.transform = `translate(${moveX}px, ${moveY}px)`;

        // Przesyłanie kierunków do gry wewnątrz iframe
        const frame = document.getElementById('game-frame').contentWindow;
        if (deltaY < -20) frame.postMessage({key: 'up'}, '*');
        if (deltaY > 20) frame.postMessage({key: 'down'}, '*');
        if (deltaX < -20) frame.postMessage({key: 'left'}, '*');
        if (deltaX > 20) frame.postMessage({key: 'right'}, '*');
    }
</script>

</body>
</html>
