<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="utf-8">
    <title>DOOM | SpinnerRealYT Games</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>

    <style>
        :root {
            --bg: #020617;
            --card: rgba(15, 23, 42, 0.7);
            --card-border: rgba(56, 189, 248, 0.2);
            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.4);
            --text: #f1f5f9;
            --text-dim: #94a3b8;
            --grad: linear-gradient(135deg, #38bdf8 0%, #818cf8 100%);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        .layout {
            display: flex;
            width: 100vw;
            height: 100vh;
        }

        /* Kontener gry */
        .game-container {
            flex-grow: 1;
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        iframe#game-frame {
            width: 100%;
            height: 100%;
            border: none;
            outline: none;
        }

        /* Panel boczny - Stylizacja z index.html */
        .side-panel {
            width: 320px;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(12px);
            border-left: 1px solid var(--card-border);
            display: flex;
            flex-direction: column;
            padding: 25px;
            z-index: 1000;
            transition: transform 0.3s ease;
        }

        .panel-header h2 {
            margin: 0;
            font-weight: 800;
            background: var(--grad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 1.5rem;
        }

        .user-info {
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid var(--accent);
            padding: 15px;
            border-radius: 16px;
            margin: 20px 0;
            text-align: center;
        }

        .user-nick {
            display: block;
            font-weight: bold;
            color: var(--accent);
            font-size: 1.2rem;
            text-transform: uppercase;
        }

        .controls-hint {
            font-size: 13px;
            color: var(--text-dim);
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .btn-exit {
            background: var(--grad);
            border: none;
            color: #000;
            padding: 12px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            text-decoration: none;
            display: block;
            text-align: center;
        }

        /* DRĄŻEK / JOYSTICK - Personalizacja na telefon */
        #joystick-wrapper {
            display: none;
            position: absolute;
            bottom: 50px;
            left: 50px;
            width: 140px;
            height: 140px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--accent);
            border-radius: 50%;
            z-index: 2000;
            touch-action: none;
        }

        #joystick-stick {
            position: absolute;
            width: 60px;
            height: 60px;
            background: var(--accent);
            border-radius: 50%;
            top: 40px;
            left: 40px;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .mobile-fire {
            display: none;
            position: absolute;
            bottom: 60px;
            right: 50px;
            width: 90px;
            height: 90px;
            background: rgba(251, 113, 133, 0.4);
            border: 2px solid #fb7185;
            border-radius: 50%;
            color: white;
            font-weight: bold;
            z-index: 2000;
        }

        /* Responsywność */
        @media (max-width: 900px) {
            .side-panel {
                position: fixed;
                right: -320px;
                height: 100%;
            }
            .side-panel.open {
                transform: translateX(-320px);
            }
            #joystick-wrapper, .mobile-fire {
                display: block;
            }
        }
    </style>
</head>
<body>

<div class="layout">
    <div class="game-container">
        <iframe id="game-frame" src="doomfiles/DOOM_html/Titlescreen.html"></iframe>

        <div id="joystick-wrapper">
            <div id="joystick-stick"></div>
        </div>
        <button class="mobile-fire" id="fire-btn">FIRE</button>
    </div>

    <aside class="side-panel" id="side-panel">
        <div class="panel-header">
            <h2>SPINNER DOOM</h2>
        </div>

        <div class="user-info">
            <small style="color: var(--text-dim)">ZALOGOWANY JAKO</small>
            <span id="player-nick" class="user-nick">GOŚĆ</span>
        </div>

        <div class="controls-hint">
            <strong>PC:</strong> Strzałki + CTRL<br>
            <strong>Mobile:</strong> Użyj drążka po lewej
        </div>

        <button onclick="window.location.href='../index.html'" class="btn-exit">WYJDŹ Z GRY</button>
        
        <p style="margin-top: auto; font-size: 10px; color: var(--text-dim); text-align: center;">
            SpinnerRealYT Games &copy; 2026
        </p>
    </aside>
</div>

<script>
    // 1. Konfiguracja Firebase (Pobrana z index.html)
    const firebaseConfig = {
        apiKey: "AIzaSyByk8GJSoTJ_bgPNjyKnKi3o30E8bQB-qo",
        authDomain: "spinnerrealyt-games.firebaseapp.com",
        databaseURL: "https://spinnerrealyt-games-default-rtdb.europe-west1.firebasedatabase.app/"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // 2. Obsługa nicku (Konto Firebase lub Nick lokalny)
    function updateDisplayName() {
        const nickSpan = document.getElementById('player-nick');
        const loggedUser = localStorage.getItem("sp_logged");

        if (loggedUser) {
            // Używa nicku zapisanego podczas logowania w index.html
            nickSpan.innerText = loggedUser;
        } else {
            // Jeśli nie zalogowany, sprawdza nick z promptu
            let guestNick = localStorage.getItem("sp_guest_nick");
            if (!guestNick) {
                guestNick = prompt("Podaj swój nick:", "Gracz" + Math.floor(Math.random()*999));
                if(guestNick) localStorage.setItem("sp_guest_nick", guestNick);
            }
            nickSpan.innerText = guestNick || "GOŚĆ";
        }
    }

    // 3. Obsługa Drążka (Joystick)
    const joystick = document.getElementById('joystick-wrapper');
    const stick = document.getElementById('joystick-stick');
    let isMoving = false;

    joystick.addEventListener('touchstart', (e) => { isMoving = true; handleJoystick(e); });
    window.addEventListener('touchmove', (e) => { if (isMoving) handleJoystick(e); });
    window.addEventListener('touchend', () => {
        isMoving = false;
        stick.style.transform = `translate(0px, 0px)`;
        // Wysyłanie sygnału stop do gry
        sendKeyToGame('stop');
    });

    function handleJoystick(e) {
        const rect = joystick.getBoundingClientRect();
        const touch = e.touches[0];
        const centerX = rect.left + 70;
        const centerY = rect.top + 70;
        
        let deltaX = touch.clientX - centerX;
        let deltaY = touch.clientY - centerY;
        
        const dist = Math.sqrt(deltaX*deltaX + deltaY*deltaY);
        const maxDist = 50;
        
        if (dist > maxDist) {
            deltaX *= maxDist / dist;
            deltaY *= maxDist / dist;
        }

        stick.style.transform = `translate(${deltaX}px, ${deltaY}px)`;

        // Mapowanie na kierunki
        if (deltaY < -20) sendKeyToGame('up');
        if (deltaY > 20) sendKeyToGame('down');
        if (deltaX < -20) sendKeyToGame('left');
        if (deltaX > 20) sendKeyToGame('right');
    }

    function sendKeyToGame(dir) {
        const gameFrame = document.getElementById('game-frame').contentWindow;
        gameFrame.postMessage({ type: 'move', direction: dir }, '*');
    }

    // Strzał mobilny
    document.getElementById('fire-btn').addEventListener('touchstart', () => {
        const gameFrame = document.getElementById('game-frame').contentWindow;
        gameFrame.postMessage({ type: 'fire' }, '*');
    });

    window.onload = updateDisplayName;
</script>

</body>
</html>
