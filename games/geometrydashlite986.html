<!DOCTYPE html>
<html lang="pl">

<head>
    <base href="https://rawcdn.githack.com/genizy/google-class/main/gdlite/">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Geometry Dash – SpinnerRealYT Games</title>
    <link rel="icon" type="image/png" href="https://e3334afd.cf-nate.pages.dev/0/g/geodash/game/splash.png">

    <style>
        :root {
            --bg: #020617;
            --card: #0f172a;
            --accent: #38bdf8;
            --text: #e5e7eb;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: radial-gradient(circle at top, #020617, #000);
            color: var(--text);
            user-select: none;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 10px 20px;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            z-index: 100;
            border-bottom: 1px solid rgba(56, 189, 248, 0.2);
        }

        header img {
            height: 32px;
        }

        nav button {
            background: none;
            border: none;
            color: var(--text);
            font-size: 15px;
            padding: 8px 14px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        nav button:hover {
            background: rgba(56, 189, 248, 0.15);
            color: var(--accent);
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
            position: relative;
        }

        .game-wrapper {
            width: 100%;
            max-width: 1200px;
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            border: 2px solid #1e293b;
            position: relative;
        }

        #gameContainer {
            width: 100%;
            height: 100%;
        }

        canvas {
            width: 100% !important;
            height: 100% !important;
            display: block;
        }

        /* Loader - Stylizowany na Twój szablon */
        #loader {
            position: absolute;
            inset: 0;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 50;
        }

        .logo {
            max-width: 80%;
            max-height: 40%;
            margin-bottom: 20px;
            object-fit: contain;
        }

        .progress-container {
            width: 80%;
            max-width: 400px;
            height: 20px;
            background: #1e293b;
            border-radius: 10px;
            border: 2px solid var(--accent);
            overflow: hidden;
            display: none;
        }

        #progress-fill {
            height: 100%;
            width: 0%;
            background: var(--accent);
            box-shadow: 0 0 15px var(--accent);
            transition: width 0.3s;
        }

        /* Sterowanie Mobilne - Drążek (Joystick) */
        #joystick-zone {
            position: absolute;
            bottom: 30px;
            left: 30px;
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            backdrop-filter: blur(5px);
            border: 2px solid rgba(56, 189, 248, 0.3);
            display: none; /* Pokazywane tylko na mobile */
            touch-action: none;
        }

        #joystick-stick {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 50px;
            height: 50px;
            background: var(--accent);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 20px var(--accent);
        }

        /* Informacja o użytkowniku */
        .user-tag {
            position: absolute;
            top: 10px;
            right: 20px;
            background: rgba(15, 23, 42, 0.8);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            border: 1px solid var(--accent);
            color: var(--accent);
        }

        @media (max-width: 768px) {
            #joystick-zone {
                display: block;
            }
            .game-wrapper {
                aspect-ratio: auto;
                height: 80vh;
            }
        }

        footer {
            text-align: center;
            opacity: .6;
            padding: 10px;
            font-size: 11px;
            background: rgba(0,0,0,0.3);
        }
    </style>
</head>

<body>

    <header>
        <img src="../Logo.png" alt="SpinnerRealYT">
        <nav><button onclick="location.href='../index.html'">Menu</button></nav>
    </header>

    <main>
        <div id="userDisplay" class="user-tag">Zalogowany jako: <span id="nickName">Gość</span></div>

        <div class="game-wrapper">
            <div id="gameContainer"></div>

            <div id="loader">
                <img class="logo" src="image/loading.png?v=1">
                <div class="progress-container" id="progressBar">
                    <div id="progress-fill"></div>
                </div>
                <div id="status-text" style="margin-top: 10px; color: var(--accent);">Inicjalizacja...</div>
            </div>
        </div>

        <div id="joystick-zone">
            <div id="joystick-stick"></div>
        </div>
    </main>

    <footer>© 2026 SpinnerRealYT Games | Firebase Protected</footer>

    <script src="Build/UnityLoader.js"></script>
    <script>
        // Obsługa Nicku (Zgodnie z instrukcją: nick z konta lub wpisany)
        const savedNick = localStorage.getItem('userNick');
        const nickDisplay = document.getElementById('nickName');
        
        if (savedNick) {
            nickDisplay.innerText = savedNick;
        } else {
            const promptNick = prompt("Wpisz swój nick (lub pozostaw puste dla Gościa):");
            if (promptNick) {
                localStorage.setItem('userNick', promptNick);
                nickDisplay.innerText = promptNick;
            }
        }

        // Inicjalizacja Gry Unity
        var gameInstance = UnityLoader.instantiate("gameContainer", "Build/GeometryDashLite.json", {
            onProgress: UnityProgress
        });

        function UnityProgress(gameInstance, progress) {
            if (!gameInstance.Module) return;
            
            const loader = document.querySelector("#loader");
            const progressBar = document.querySelector("#progressBar");
            const progressFill = document.querySelector("#progress-fill");
            const statusText = document.querySelector("#status-text");

            progressBar.style.display = "block";
            progressFill.style.width = (progress * 100) + "%";
            statusText.innerText = "Ładowanie: " + Math.round(progress * 100) + "%";

            if (progress === 1 && !gameInstance.removeTimeout) {
                statusText.innerText = "Przygotowywanie...";
                gameInstance.removeTimeout = setTimeout(function() {
                    loader.style.opacity = "0";
                    setTimeout(() => loader.style.display = "none", 500);
                }, 2000);
            }
        }

        // Obsługa Drążka (Joysticka) na telefonach
        const joystick = document.getElementById('joystick-zone');
        const stick = document.getElementById('joystick-stick');
        let moveForward = false;

        joystick.addEventListener('touchstart', handleTouch);
        joystick.addEventListener('touchmove', handleTouch);
        joystick.addEventListener('touchend', () => {
            stick.style.transform = `translate(-50%, -50%)`;
            // W Geometry Dash dotyk/ruch w górę to skok
            simulateKeyEvent(38, "keyup"); // Strzałka w górę
            simulateKeyEvent(32, "keyup"); // Spacja
        });

        function handleTouch(e) {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = joystick.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            let x = touch.clientX - centerX;
            let y = touch.clientY - centerY;
            
            const distance = Math.sqrt(x*x + y*y);
            const maxDistance = rect.width / 2;

            if (distance > maxDistance) {
                x = x * (maxDistance / distance);
                y = y * (maxDistance / distance);
            }

            stick.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px))`;

            // Jeśli drążek jest wychylony w górę - symuluj skok
            if (y < -10) {
                simulateKeyEvent(38, "keydown");
                simulateKeyEvent(32, "keydown");
            }
        }

        function simulateKeyEvent(keyCode, type) {
            const event = new KeyboardEvent(type, {
                keyCode: keyCode,
                which: keyCode,
                bubbles: true
            });
            document.dispatchEvent(event);
        }

        // Automatyczne klikanie "OK" (z oryginalnego pliku)
        document.addEventListener('DOMContentLoaded', function() {
            const clickOK = () => {
                let buttons = document.getElementsByTagName('button');
                for (let i = 0; i < buttons.length; i++) {
                    if (buttons[i].innerHTML == "OK") buttons[i].click();
                }
            };
            setTimeout(clickOK, 500);
            setTimeout(clickOK, 1000);
        });
    </script>
</body>

</html>
