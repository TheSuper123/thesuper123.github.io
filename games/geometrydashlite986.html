<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Geometry Dash Lite | Spinner Games</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>

    <link rel="icon" type="image/png" href="../Logo.png">

    <style>
        :root {
            --bg: #020617;
            --card: rgba(15, 23, 42, 0.7);
            --card-border: rgba(56, 189, 248, 0.2);
            --accent: #38bdf8;
            --text: #f1f5f9;
            --grad: linear-gradient(135deg, #38bdf8 0%, #818cf8 100%);
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            background-image: radial-gradient(circle at 50% -20%, #1e293b 0%, transparent 50%);
            overflow-y: auto;
        }

        header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 15px 5%; background: rgba(2, 6, 23, 0.8); backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--card-border); position: sticky; top: 0; z-index: 1000;
        }

        .logo-area { display: flex; align-items: center; gap: 12px; }
        .logo-area img { height: 35px; }
        .logo-area span { font-weight: 800; font-size: 1.1rem; background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .btn-back {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1);
            color: var(--text); padding: 8px 20px; border-radius: 12px; cursor: pointer; font-weight: 600;
            text-decoration: none; font-size: 14px;
        }
        .btn-back:hover { border-color: var(--accent); color: var(--accent); }

        main { max-width: 1000px; margin: auto; padding: 40px 20px; }

        .game-card {
            background: var(--card); border: 1px solid var(--card-border); border-radius: 24px;
            padding: 20px; position: relative;
        }

        #game-wrapper {
            position: relative; width: 100%; background: #000;
            border-radius: 16px; overflow: hidden; aspect-ratio: 16 / 9;
            border: 1px solid var(--card-border);
        }

        #gameContainer { width: 100%; height: 100%; }

        .fullscreen-btn {
            display: block; width: 100%; max-width: 280px; margin: 25px auto 0;
            padding: 15px; background: var(--grad); border: none;
            color: #000; font-weight: 800; border-radius: 14px; cursor: pointer;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .fullscreen-btn:hover { transform: scale(1.03); box-shadow: 0 0 20px var(--accent); }

        /* Loader */
        #loader {
            position: absolute; inset: 0; background: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10;
        }
        .progress-bar { width: 60%; height: 8px; background: #1e293b; border-radius: 4px; margin-top: 20px; overflow: hidden; }
        #progress-fill { width: 0%; height: 100%; background: var(--accent); }

        /* Drążek dla telefonów (Zgodnie z instrukcją) */
        #joystick-zone {
            position: fixed; bottom: 40px; left: 40px; width: 100px; height: 100px;
            background: rgba(255,255,255,0.05); border: 2px solid var(--accent);
            border-radius: 50%; display: none; touch-action: none; z-index: 1000;
        }
        #joystick-stick {
            position: absolute; top: 50%; left: 50%; width: 40px; height: 40px;
            background: var(--accent); border-radius: 50%; transform: translate(-50%, -50%);
        }

        @media (max-width: 768px) {
            #joystick-zone { display: block; }
            #game-wrapper { aspect-ratio: 4 / 3; }
        }

        footer { text-align: center; padding: 40px; color: #94a3b8; font-size: 13px; }
    </style>
</head>

<body>

<header>
    <a href="../index.html" class="btn-back">← POWRÓT</a>
    <div class="logo-area">
        <img src="../Logo.png" alt="Logo">
        <span>SPINNER GAMES</span>
    </div>
</header>

<main>
    <div class="game-card">
        <h2 style="text-align: center; margin-bottom: 20px; letter-spacing: -1px;">GEOMETRY DASH LITE</h2>
        
        <div id="game-wrapper">
            <div id="gameContainer"></div>
            <div id="loader">
                <img src="gdlitefiles/image/loading.png" style="width: 200px;">
                <div class="progress-bar"><div id="progress-fill"></div></div>
            </div>
        </div>

        <button class="fullscreen-btn" onclick="openFullscreen()">PEŁNY EKRAN</button>
    </div>
</main>

<div id="joystick-zone"><div id="joystick-stick"></div></div>

<footer>© 2026 SpinnerRealYT Games</footer>

<script src="gdlitefiles/Build/UnityLoader.js"></script>
<script>
    // Konfiguracja Firebase (Skopiuj ze swojego index.html jeśli chcesz mieć tu logowanie)
    const firebaseConfig = {
        apiKey: "AIzaSyByk8GJSoTJ_bgPNjyKnKi3o30E8bQB-qo",
        authDomain: "spinnerrealyt-games.firebaseapp.com",
        databaseURL: "https://spinnerrealyt-games-default-rtdb.europe-west1.firebasedatabase.app/"
    };
    firebase.initializeApp(firebaseConfig);

    var gameInstance = UnityLoader.instantiate("gameContainer", "gdlitefiles/Build/GeometryDashLite.json", {
        onProgress: (inst, prog) => {
            document.getElementById("progress-fill").style.width = (prog * 100) + "%";
            if (prog === 1) setTimeout(() => document.getElementById("loader").style.display = "none", 1500);
        }
    });

    function openFullscreen() {
        let el = document.getElementById("game-wrapper");
        if (el.requestFullscreen) el.requestFullscreen();
        else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    }

    // Sterowanie mobilne - skok
    const joy = document.getElementById('joystick-zone');
    joy.addEventListener('touchstart', (e) => {
        e.preventDefault();
        document.dispatchEvent(new KeyboardEvent('keydown', { keyCode: 32 }));
        document.getElementById('joystick-stick').style.background = "#fff";
    });
    joy.addEventListener('touchend', () => {
        document.dispatchEvent(new KeyboardEvent('keyup', { keyCode: 32 }));
        document.getElementById('joystick-stick').style.background = "var(--accent)";
    });

    // Auto-klik OK
    setInterval(() => {
        let btns = document.getElementsByTagName('button');
        for (let b of btns) { if (b.innerText.trim() === "OK") b.click(); }
    }, 1000);
</script>

</body>
</html>
