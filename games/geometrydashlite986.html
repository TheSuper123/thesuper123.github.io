<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Geometry Dash Lite | Spinner Games</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>

    <link rel="icon" type="image/png" href="../Logo.png">

    <style>
        :root {
            --bg: #020617;
            --card: rgba(15, 23, 42, 0.7);
            --card-border: rgba(56, 189, 248, 0.2);
            --accent: #38bdf8;
            --text: #f1f5f9;
            --grad: linear-gradient(135deg, #38bdf8 0%, #818cf8 100%);
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            background-image: radial-gradient(circle at 50% -20%, #1e293b 0%, transparent 50%);
            overflow-y: auto;
        }

        header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 5%; background: rgba(2, 6, 23, 0.8); backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--card-border); position: sticky; top: 0; z-index: 1000;
        }

        .logo-area { display: flex; align-items: center; gap: 12px; }
        .logo-area img { height: 30px; }
        
        /* Status połączenia w prawym górnym rogu */
        #sync-status {
            text-align: right;
            font-size: 11px;
            color: var(--text-dim);
            line-height: 1.4;
        }
        .status-dot { height: 8px; width: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .online { background: #4ade80; box-shadow: 0 0 10px #4ade80; }
        .offline { background: #fb7185; }

        .btn-back {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            color: var(--text); padding: 6px 15px; border-radius: 10px; cursor: pointer; text-decoration: none; font-size: 13px;
        }

        main { max-width: 1000px; margin: auto; padding: 20px; }

        .game-card {
            background: var(--card); border: 1px solid var(--card-border); border-radius: 24px;
            padding: 20px; position: relative;
        }

        #game-wrapper {
            position: relative; width: 100%; background: #000;
            border-radius: 16px; overflow: hidden; aspect-ratio: 16 / 9;
            border: 1px solid var(--card-border);
        }

        #gameContainer { width: 100%; height: 100%; }

        .fullscreen-btn {
            display: block; width: 100%; max-width: 250px; margin: 20px auto 0;
            padding: 12px; background: var(--grad); border: none;
            color: #000; font-weight: 800; border-radius: 12px; cursor: pointer;
        }

        #loader {
            position: absolute; inset: 0; background: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10;
        }
        .progress-bar { width: 60%; height: 6px; background: #1e293b; border-radius: 3px; margin-top: 15px; overflow: hidden; }
        #progress-fill { width: 0%; height: 100%; background: var(--accent); transition: width 0.3s; }

        /* Joystick Mobilny */
        #joystick-zone {
            position: fixed; bottom: 30px; left: 30px; width: 90px; height: 90px;
            background: rgba(255,255,255,0.05); border: 2px solid var(--accent);
            border-radius: 50%; display: none; touch-action: none; z-index: 1000;
        }
        #joystick-stick {
            position: absolute; top: 50%; left: 50%; width: 35px; height: 35px;
            background: var(--accent); border-radius: 50%; transform: translate(-50%, -50%);
        }

        @media (max-width: 768px) { #joystick-zone { display: block; } #game-wrapper { aspect-ratio: 4/3; } }
    </style>
</head>

<body>

<header>
    <a href="../index.html" class="btn-back">← MENU</a>
    
    <div class="logo-area">
        <img src="../Logo.png" alt="Logo">
    </div>

    <div id="sync-status">
        <div id="user-info">Ładowanie...</div>
        <div id="last-sync">Ostatni sync: Brak</div>
    </div>
</header>

<main>
    <div class="game-card">
        <div id="game-wrapper">
            <div id="gameContainer"></div>
            <div id="loader">
                <img src="gdlitefiles/image/loading.png" style="width: 150px;">
                <div class="progress-bar"><div id="progress-fill"></div></div>
            </div>
        </div>
        <button class="fullscreen-btn" onclick="openFullscreen()">PEŁNY EKRAN</button>
    </div>
</main>

<div id="joystick-zone"><div id="joystick-stick"></div></div>

<script src="gdlitefiles/Build/UnityLoader.js"></script>
<script>
    // Konfiguracja Firebase (DOKŁADNIE TAKA JAK W TWOIM INDEX)
    const firebaseConfig = {
        apiKey: "AIzaSyByk8GJSoTJ_bgPNjyKnKi3o30E8bQB-qo",
        authDomain: "spinnerrealyt-games.firebaseapp.com",
        databaseURL: "https://spinnerrealyt-games-default-rtdb.europe-west1.firebasedatabase.app/"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    const nick = localStorage.getItem("sp_logged");
    const userInfoEl = document.getElementById('user-info');
    const syncInfoEl = document.getElementById('last-sync');

    // Funkcja zapisu danych do Firebase
    function syncDataToFirebase(progressValue) {
        if(!nick) return;
        
        const now = new Date().toLocaleTimeString();
        db.ref('users_progress/' + nick.toLowerCase()).update({
            last_game: "Geometry Dash Lite",
            last_sync_time: now,
            loading_progress: progressValue + "%",
            status: "online"
        }).then(() => {
            syncInfoEl.innerText = "Ostatni sync: " + now;
        });
    }

    // Sprawdzanie statusu zalogowania
    if(nick) {
        userInfoEl.innerHTML = `<span class="status-dot online"></span> Zalogowany: <b>${nick}</b>`;
        syncDataToFirebase(0); // Pierwszy sync przy wejściu
    } else {
        userInfoEl.innerHTML = `<span class="status-dot offline"></span> Niezalogowany`;
    }

    // Ładowanie gry
    var gameInstance = UnityLoader.instantiate("gameContainer", "gdlitefiles/Build/GeometryDashLite.json", {
        onProgress: (inst, prog) => {
            let p = Math.round(prog * 100);
            document.getElementById("progress-fill").style.width = p + "%";
            
            // Wysyłaj progres ładowania co 25% do bazy
            if (p % 25 === 0) syncDataToFirebase(p);

            if (prog === 1) {
                setTimeout(() => {
                    document.getElementById("loader").style.display = "none";
                    syncDataToFirebase(100);
                }, 1500);
            }
        }
    });

    function openFullscreen() {
        let el = document.getElementById("game-wrapper");
        if (el.requestFullscreen) el.requestFullscreen();
        else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    }

    // Joystick
    const joy = document.getElementById('joystick-zone');
    joy.addEventListener('touchstart', (e) => {
        e.preventDefault();
        document.dispatchEvent(new KeyboardEvent('keydown', { keyCode: 32 }));
        document.getElementById('joystick-stick').style.background = "#fff";
    });
    joy.addEventListener('touchend', () => {
        document.dispatchEvent(new KeyboardEvent('keyup', { keyCode: 32 }));
        document.getElementById('joystick-stick').style.background = "var(--accent)";
    });

    // Auto-klik OK
    setInterval(() => {
        let btns = document.getElementsByTagName('button');
        for (let b of btns) { if (b.innerText.trim() === "OK") b.click(); }
    }, 1000);

    // Zmiana statusu na offline przy wyjściu
    window.onbeforeunload = function() {
        if(nick) db.ref('users_progress/' + nick.toLowerCase()).update({ status: "offline" });
    };
</script>

</body>
</html>
