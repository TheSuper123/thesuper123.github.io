<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Geometry Dash – SpinnerRealYT Games</title>
    
    <link rel="icon" type="image/png" href="../Logo.png?v=2">
    <link rel="apple-touch-icon" href="../Logo.png?v=2">

    <style>
        :root {
            --bg: #020617;
            --card: #0f172a;
            --accent: #38bdf8;
            --text: #e5e7eb;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Inter, system-ui, sans-serif;
            background: radial-gradient(circle at top, #020617, #000);
            color: var(--text);
            user-select: none;
            overflow-x: hidden;
            /* Naprawa przewijania - usunięto overflow: hidden */
            min-height: 100vh;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between; /* Logo po prawej, menu po lewej */
            padding: 15px 20px;
            background: rgba(15, 23, 42, .9);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header img {
            height: 32px;
        }

        nav button {
            background: none;
            border: none;
            color: var(--text);
            font-size: 15px;
            padding: 8px 14px;
            border-radius: 10px;
            cursor: pointer;
        }

        nav button:hover {
            background: rgba(56, 189, 248, .15);
            color: var(--accent);
        }

        main {
            max-width: 900px;
            margin: auto;
            padding: 20px 10px;
        }

        .card {
            background: linear-gradient(180deg, #0f172a, #020617);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, .6);
            border: 1px solid rgba(56, 189, 248, 0.1);
        }

        h2 {
            text-align: center;
            margin-top: 0;
            color: var(--accent);
        }

        /* Kontener Gry */
        #game-wrapper {
            position: relative;
            width: 100%;
            background: #000;
            border: 3px solid #1e293b;
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 16 / 9;
        }

        #gameContainer {
            width: 100%;
            height: 100%;
        }

        canvas {
            width: 100% !important;
            height: 100% !important;
            display: block;
        }

        /* Przycisk Fullscreen */
        .fullscreen-btn {
            display: block;
            width: 100%;
            max-width: 200px;
            margin: 15px auto;
            padding: 12px;
            background: var(--card);
            border: 2px solid var(--accent);
            color: var(--accent);
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            text-align: center;
            transition: 0.3s;
        }

        .fullscreen-btn:hover {
            background: var(--accent);
            color: var(--bg);
        }

        /* Loader */
        #loader {
            position: absolute;
            inset: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .progress-bar {
            width: 70%;
            height: 10px;
            background: #1e293b;
            border-radius: 5px;
            margin-top: 20px;
            overflow: hidden;
        }

        #progress-fill {
            width: 0%;
            height: 100%;
            background: var(--accent);
            box-shadow: 0 0 15px var(--accent);
        }

        /* Drążek mobilny */
        #joystick-zone {
            position: fixed;
            bottom: 40px;
            left: 40px;
            width: 100px;
            height: 100px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid var(--accent);
            border-radius: 50%;
            display: none;
            touch-action: none;
            z-index: 1000;
        }

        #joystick-stick {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 40px;
            height: 40px;
            background: var(--accent);
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        @media (max-width: 768px) {
            #joystick-zone { display: block; }
        }

        footer {
            text-align: center;
            opacity: .6;
            padding: 30px;
            font-size: 12px;
        }
    </style>
</head>

<body>

    <header>
        <nav><button onclick="location.href='../index.html'">Menu</button></nav>
        <img src="../Logo.png" alt="SpinnerRealYT">
    </header>

    <main>
        <div class="card">
            <h2>Geometry Dash Lite</h2>

            <div id="game-wrapper">
                <div id="gameContainer"></div>
                
                <div id="loader">
                    <img src="https://e3334afd.cf-nate.pages.dev/0/g/geodash/game/splash.png" style="width: 100px;">
                    <div class="progress-bar">
                        <div id="progress-fill"></div>
                    </div>
                </div>
            </div>

            <button class="fullscreen-btn" onclick="toggleFullscreen()">PEŁNY EKRAN</button>
            
            <div style="text-align: center; margin-top: 10px; font-size: 14px; color: var(--accent);">
                Użyj przycisku, aby powiększyć grę na cały ekran.
            </div>
        </div>
    </main>

    <div id="joystick-zone">
        <div id="joystick-stick"></div>
    </div>

    <footer>© 2026 SpinnerRealYT Games | Firebase Protected</footer>

    <script src="https://rawcdn.githack.com/genizy/google-class/main/gdlite/Build/UnityLoader.js"></script>
    <script>
        var gameInstance = UnityLoader.instantiate("gameContainer", "https://rawcdn.githack.com/genizy/google-class/main/gdlite/Build/GeometryDashLite.json", {
            onProgress: UnityProgress
        });

        function UnityProgress(gameInstance, progress) {
            if (!gameInstance.Module) return;
            const fill = document.getElementById("progress-fill");
            fill.style.width = (progress * 100) + "%";
            if (progress === 1) {
                setTimeout(() => {
                    document.getElementById("loader").style.display = "none";
                }, 1500);
            }
        }

        function toggleFullscreen() {
            var container = document.getElementById("game-wrapper");
            if (!document.fullscreenElement) {
                container.requestFullscreen().catch(err => {
                    alert(`Błąd: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        }

        // Drążek - Sterowanie skokiem
        const joystick = document.getElementById('joystick-zone');
        const stick = document.getElementById('joystick-stick');
        
        joystick.addEventListener('touchstart', (e) => handleJump(true));
        joystick.addEventListener('touchend', (e) => handleJump(false));
        
        function handleJump(isPressed) {
            const eventType = isPressed ? 'keydown' : 'keyup';
            const event = new KeyboardEvent(eventType, { keyCode: 32, which: 32 }); // Spacja
            document.dispatchEvent(event);
            stick.style.background = isPressed ? '#fff' : 'var(--accent)';
        }

        // Auto-klik "OK"
        setInterval(() => {
            let buttons = document.getElementsByTagName('button');
            for (let b of buttons) { if (b.innerText === "OK") b.click(); }
        }, 1000);
    </script>
</body>

</html>
