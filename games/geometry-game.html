<!DOCTYPE html>
<html lang="pl" style="background-color: #020617;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Spinner Dash – SpinnerRealYT Games</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#020617">

    <link rel="icon" type="image/png" href="../Logo.png?v=2">
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>

    <style>
        :root {
            --bg: #020617;
            --accent: #38bdf8;
            --text: #e5e7eb;
            --ship-color: #facc15;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0; font-family: Inter, sans-serif;
            background: #020617; color: var(--text);
            overflow: hidden; touch-action: none; user-select: none;
        }

        header {
            display: flex; align-items: center; justify-content: space-between; padding: 15px 20px;
            background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px);
            position: fixed; top: 0; width: 100%; z-index: 100;
            border-bottom: 1px solid rgba(56, 189, 248, 0.1);
        }
        header img { height: 32px; }
        .account-box { text-align: right; }
        .user-info { font-size: 13px; color: var(--accent); font-weight: bold; }
        nav button { background: none; border: none; color: var(--text); padding: 8px 14px; cursor: pointer; border-radius: 10px; }
        nav button:hover { background: rgba(56, 189, 248, 0.15); }

        main { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding-top: 60px; }

        #game-container {
            position: relative; width: 100%; max-width: 800px; height: 400px;
            background: linear-gradient(to bottom, #0f172a, #020617);
            border: 2px solid rgba(56, 189, 248, 0.2); border-radius: 15px; overflow: hidden;
        }

        canvas { display: block; width: 100%; height: 100%; }

        #ui-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.7); z-index: 10;
        }

        .menu-card { background: #1e293b; padding: 30px; border-radius: 24px; text-align: center; border: 1px solid var(--accent); }
        select, button {
            background: #0f172a; color: white; border: 1px solid var(--accent);
            border-radius: 12px; padding: 12px; font-size: 16px; margin: 10px; width: 200px; cursor: pointer;
        }
        button:active { transform: scale(0.95); }

        #progress-bar {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            width: 60%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px;
        }
        #progress-fill { width: 0%; height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.1s; }
        
        #game-info { position: absolute; bottom: 10px; left: 20px; font-size: 12px; color: var(--accent); }
        .mode-badge {
            position: absolute; top: 25px; left: 50%; transform: translateX(-50%);
            font-weight: 900; font-size: 20px; text-transform: uppercase; letter-spacing: 2px;
            opacity: 0.5; pointer-events: none;
        }
    </style>
</head>
<body>

<header>
    <div style="display:flex; align-items:center; gap:10px;">
        <img src="../Logo.png" alt="Logo">
        <nav><button onclick="location.href='../index.html'">Wróć</button></nav>
    </div>
    <div class="account-box">
        <div id="user-display" class="user-info">GUEST</div>
        <div id="points-display" style="font-size: 10px; color: #94a3b8;">Points: 0</div>
    </div>
</header>

<main>
    <div id="game-container">
        <div id="ui-overlay">
            <div class="menu-card">
                <h2 style="margin-top:0; color:var(--accent)">SPINNER DASH</h2>
                <select id="diff-select">
                    <option value="1">Łatwy (Easy)</option>
                    <option value="1.5">Średni (Medium)</option>
                    <option value="2">Trudny (Hard)</option>
                    <option value="2.5">Ekstremalny (Extreme)</option>
                </select>
                <br>
                <button id="start-btn">START</button>
            </div>
        </div>

        <div id="progress-bar"><div id="progress-fill"></div></div>
        <div id="game-info">PUNKTY ZA WYGRANĄ: +5</div>
        <div id="mode-badge" class="mode-badge">CUBE</div>
        <canvas id="gameCanvas"></canvas>
    </div>
    <p style="font-size: 12px; color: #64748b; margin-top: 15px;">SPACJA / KLIKNIĘCIE = SKOK LUB LOT</p>
</main>

<script>
(() => {
    const firebaseConfig = {
        apiKey: "AIzaSyByk8GJSoTJ_bgPNjyKnKi3o30E8bQB-qo",
        authDomain: "spinnerrealyt-games.firebaseapp.com",
        databaseURL: "https://spinnerrealyt-games-default-rtdb.europe-west1.firebasedatabase.app/"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();
    const loggedUser = localStorage.getItem("sp_logged");

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const ui = document.getElementById('ui-overlay');
    const progFill = document.getElementById('progress-fill');
    const modeBadge = document.getElementById('mode-badge');

    let points = 0;
    
    // Inicjalizacja Firebase
    auth.onAuthStateChanged(user => {
        if(user && loggedUser) {
            document.getElementById('user-display').textContent = loggedUser.toUpperCase();
            db.ref('users/' + loggedUser + '/points').on('value', snap => {
                points = snap.val() || 0;
                document.getElementById('points-display').textContent = `Points: ${points}`;
            });
        }
    });

    // Ustawienia gry
    let gameActive = false;
    let difficulty = 1;
    let score = 0;
    let gameTime = 0;
    const levelDuration = 60 * 60; // 60 sekund przy 60fps

    const player = {
        x: 100, y: 300, w: 30, h: 30,
        dy: 0, gravity: 0.6, jump: -10,
        rotation: 0, isShip: false,
        isPressing: false
    };

    let obstacles = [];
    let particles = [];

    function resize() {
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // Kontrolery
    const handleAction = (e) => {
        if (!gameActive) return;
        player.isPressing = true;
        if (!player.isShip && player.y >= canvas.height - player.h - 5) {
            player.dy = player.jump;
        }
    };
    const stopAction = () => player.isPressing = false;

    window.addEventListener('keydown', e => { if(e.code === 'Space') handleAction(); });
    window.addEventListener('keyup', e => { if(e.code === 'Space') stopAction(); });
    canvas.addEventListener('mousedown', handleAction);
    window.addEventListener('mouseup', stopAction);
    canvas.addEventListener('touchstart', e => { e.preventDefault(); handleAction(); });
    canvas.addEventListener('touchend', stopAction);

    function spawnObstacle() {
        if (!gameActive) return;
        let type = Math.random() > 0.4 ? 'spike' : 'block';
        let obs = {
            x: canvas.width + 100,
            w: 30,
            h: type === 'spike' ? 30 : 40,
            type: type
        };
        obstacles.push(obs);
        
        let nextSpawn = (Math.random() * 1000 / difficulty) + 600;
        setTimeout(spawnObstacle, nextSpawn);
    }

    function resetGame() {
        player.y = canvas.height - 35;
        player.dy = 0;
        player.rotation = 0;
        player.isShip = false;
        obstacles = [];
        score = 0;
        gameTime = 0;
        gameActive = true;
        ui.style.display = 'none';
        modeBadge.textContent = "CUBE";
        modeBadge.style.color = "var(--accent)";
        spawnObstacle();
        requestAnimationFrame(update);
    }

    function die() {
        gameActive = false;
        ui.style.display = 'flex';
        // Prosta animacja cząsteczek przy śmierci
        for(let i=0; i<15; i++) {
            particles.push({
                x: player.x, y: player.y,
                dx: (Math.random()-0.5)*10, dy: (Math.random()-0.5)*10,
                life: 30
            });
        }
    }

    async function win() {
        gameActive = false;
        ui.style.display = 'flex';
        if(loggedUser && auth.currentUser) {
            points += 5;
            await db.ref('users/' + loggedUser).update({ points: points });
        }
        alert("POZIOM UKOŃCZONY! +5 PKT");
    }

    function update() {
        if (!gameActive) return;

        gameTime++;
        progFill.style.width = (gameTime / levelDuration * 100) + "%";

        if (gameTime >= levelDuration) { win(); return; }

        // Logika Samolocika (Ship Mode) - 20% szans na sekcję co jakiś czas
        // Tutaj uproszczone: między 20s a 40s trwania poziomu
        if (gameTime > 1200 && gameTime < 2400) {
            if (!player.isShip) {
                player.isShip = true;
                modeBadge.textContent = "SHIP MODE";
                modeBadge.style.color = "var(--ship-color)";
            }
        } else {
            if (player.isShip) {
                player.isShip = false;
                modeBadge.textContent = "CUBE";
                modeBadge.style.color = "var(--accent)";
            }
        }

        // Fizyka
        if (player.isShip) {
            player.gravity = 0.35;
            if (player.isPressing) player.dy -= 0.8;
            else player.dy += player.gravity;
            
            // Ograniczenie góra/dół w statku
            if (player.y < 0) { player.y = 0; player.dy = 0; }
            if (player.y > canvas.height - player.h) die(); 
        } else {
            player.dy += player.gravity;
            player.y += player.dy;
            if (player.y > canvas.height - player.h - 5) {
                player.y = canvas.height - player.h - 5;
                player.dy = 0;
                player.rotation = Math.round(player.rotation / 90) * 90;
            } else {
                player.rotation += 5 * difficulty;
            }
        }
        player.y += player.dy;

        // Przeszkody
        for (let i = obstacles.length - 1; i >= 0; i--) {
            obstacles[i].x -= 5 * difficulty;

            // Kolizja (Hitbox nieco mniejszy dla sprawiedliwości)
            if (player.x + player.w - 5 > obstacles[i].x && 
                player.x + 5 < obstacles[i].x + obstacles[i].w &&
                player.y + player.h - 5 > (canvas.height - obstacles[i].h - 5)) {
                die();
            }

            if (obstacles[i].x < -50) obstacles.splice(i, 1);
        }

        draw();
        requestAnimationFrame(update);
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Podłoga
        ctx.strokeStyle = 'rgba(56, 189, 248, 0.5)';
        ctx.beginPath();
        ctx.moveTo(0, canvas.height - 5);
        ctx.lineTo(canvas.width, canvas.height - 5);
        ctx.stroke();

        // Przeszkody
        ctx.fillStyle = '#f87171';
        obstacles.forEach(o => {
            if (o.type === 'spike') {
                ctx.beginPath();
                ctx.moveTo(o.x, canvas.height - 5);
                ctx.lineTo(o.x + o.w / 2, canvas.height - 5 - o.h);
                ctx.lineTo(o.x + o.w, canvas.height - 5);
                ctx.fill();
            } else {
                ctx.fillRect(o.x, canvas.height - 5 - o.h, o.w, o.h);
                ctx.strokeRect(o.x, canvas.height - 5 - o.h, o.w, o.h);
            }
        });

        // Gracz
        ctx.save();
        ctx.translate(player.x + player.w / 2, player.y + player.h / 2);
        if (!player.isShip) ctx.rotate(player.rotation * Math.PI / 180);
        
        ctx.fillStyle = player.isShip ? var(--ship-color) : var(--accent);
        ctx.shadowBlur = 15;
        ctx.shadowColor = ctx.fillStyle;
        
        // Wygląd statku vs kostki
        if(player.isShip) {
            ctx.beginPath();
            ctx.moveTo(-15, 0); ctx.lineTo(15, -10); ctx.lineTo(15, 10); ctx.closePath();
            ctx.fill();
        } else {
            ctx.fillRect(-player.w / 2, -player.h / 2, player.w, player.h);
            ctx.strokeStyle = "white";
            ctx.strokeRect(-player.w / 2, -player.h / 2, player.w, player.h);
        }
        ctx.restore();

        // Cząsteczki
        particles.forEach((p, i) => {
            p.x += p.dx; p.y += p.dy; p.life--;
            ctx.fillStyle = `rgba(56, 189, 248, ${p.life/30})`;
            ctx.fillRect(p.x, p.y, 4, 4);
            if(p.life <= 0) particles.splice(i, 1);
        });
    }

    document.getElementById('start-btn').onclick = () => {
        difficulty = parseFloat(document.getElementById('diff-select').value);
        resetGame();
    };

})();
</script>
</body>
</html>
