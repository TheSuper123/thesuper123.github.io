<link rel="apple-touch-icon" href="../Logo.png?v=2">

<style>
:root{
  --bg:#020617;
  --card:#0f172a;
  --accent:#38bdf8;
  --text:#e5e7eb;
  --ship:#facc15;
  --portal-ship: #d946ef;
  --portal-cube: #4ade80;
}

* {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

body {
  margin: 0; 
  font-family: Inter, sans-serif;
  background: radial-gradient(circle at top, #1e293b, #020617);
  background-attachment: fixed;
  color: var(--text); 
  user-select: none;
  min-height: 100vh;
  padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}

header {
  display: flex; align-items: center; justify-content: space-between; gap: 15px; padding: 15px 20px;
  background: rgba(15, 23, 42, 0.9); 
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  position: sticky; top: 0; z-index: 100;
  border-bottom: 1px solid rgba(56, 189, 248, 0.1);
}
header img { height: 32px; }

.account-box { text-align: right; }
.user-info { font-size: 13px; color: var(--accent); font-weight: bold; }
.sync-status { font-size: 9px; color: #64748b; margin-top: 2px; text-transform: uppercase; letter-spacing: 1px;}

nav button {
  background: none; border: none; color: var(--text); font-size: 15px;
  padding: 8px 14px; border-radius: 10px; cursor: pointer;
}
nav button:hover { background: rgba(56, 189, 248, 0.15); color: var(--accent); }

main { max-width: 800px; margin: auto; padding: 10px; }

.card {
  background: linear-gradient(180deg, #0f172a, #020617);
  border-radius: 24px; padding: 15px;
  box-shadow: 0 20px 60px rgba(0,0,0,.6);
  border: 1px solid rgba(255,255,255,0.05);
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

h2 { text-align: center; margin-top: 0; margin-bottom: 15px; font-weight: 800; letter-spacing: -1px; }

#menu {
  display: flex; flex-direction: column; align-items: center; gap: 12px;
  margin-bottom: 15px;
}

select, button {
  background: #1e293b; color: white; border: 1px solid #334155;
  border-radius: 12px; padding: 10px 12px; font-size: 14px; outline: none;
  -webkit-appearance: none;
}

.btn-primary { 
    cursor: pointer; background: var(--card); border: 1px solid var(--accent); 
    color: var(--accent); font-weight: bold; width: 100%; max-width: 250px;
    padding: 15px; font-size: 16px; letter-spacing: 1px;
}
.btn-primary:active { transform: scale(0.96); }

.game-info-bar {
    display: flex; justify-content: space-between; width: 100%; max-width: 500px;
    font-size: 13px; color: #94a3b8; border-bottom: 1px solid #334155; padding-bottom: 10px;
}

#game-wrapper {
    position: relative;
    width: 100%;
    height: 300px;
    background: #000;
    border-radius: 12px;
    border: 1px solid #334155;
    overflow: hidden;
    margin-top: 10px;
}

canvas {
    display: block;
    width: 100%;
    height: 100%;
}

#in-game-popup {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.85); backdrop-filter: blur(5px);
    display: none; flex-direction: column; align-items: center; justify-content: center;
    z-index: 10;
}
#popup-title { font-size: 28px; font-weight: 900; margin-bottom: 10px; text-transform: uppercase; }
#popup-msg { font-size: 15px; color: #94a3b8; margin-bottom: 25px; text-align: center; padding: 0 20px; }

#progress-container {
    width: 100%; max-width: 400px; height: 8px; background: rgba(255,255,255,0.1);
    border-radius: 4px; margin: 15px auto 0; position: relative; overflow: hidden;
}
#progress-bar {
    width: 0%; height: 100%; background: var(--accent);
    transition: width 0.1s linear;
}

#points-info {
    text-align: center; margin-top: 15px; font-weight: bold; padding: 10px;
    border-top: 1px solid #334155; font-size: 1.2rem;
}

footer { text-align: center; opacity: 0.5; padding: 30px 20px; font-size: 11px; }

.instruction { font-size: 12px; color: #64748b; text-align: center; margin-top: 10px; }
</style>
</head>
<body>

<header>
  <div style="display:flex; align-items:center; gap:10px;">
    <img src="../Logo.png" alt="SpinnerRealYT">
    <nav><button onclick="location.href='../index.html'">Wróć</button></nav>
  </div>
  <div class="account-box">
    <div id="user-display" class="user-info">GUEST</div>
    <div id="sync-display" class="sync-status">OFFLINE</div>
  </div>
</header>

<main>
  <div class="card" id="main-card">
    <h2>🚀 Spinner Dash</h2>
    
    <div id="menu">
      <select id="difficulty-select">
        <option value="1">Łatwy (+1 pkt)</option>
        <option value="1.5" selected>Średni (+2 pkt)</option>
        <option value="2">Trudny (+3 pkt)</option>
        <option value="2.5">Ekstremalny (+5 pkt)</option>
      </select>
      <button id="start-btn" class="btn-primary">ZAGRAJ</button>
      
      <div class="game-info-bar">
          <div id="info">Cel: 100% Trasy</div>
          <div id="timer">⏱️ 0.0s</div>
      </div>
    </div>

    <div id="game-wrapper">
        <canvas id="gameCanvas"></canvas>
        <div id="in-game-popup">
            <div id="popup-title" style="color: var(--accent);">GEOMETRY DASH</div>
            <div id="popup-msg">Przytrzymaj by skakać lub latać.</div>
            <button id="popup-btn" class="btn-primary" style="display: none;">ZAGRAJ PONOWNIE</button>
        </div>
    </div>
    
    <div id="progress-container"><div id="progress-bar"></div></div>
    
    <div class="instruction">Spacja lub kliknięcie/przytrzymanie palca na ekranie gry.</div>
    <div id="points-info" style="color: var(--accent);">Points: 0</div>
  </div>
</main>

<footer>© 2026 SpinnerRealYT Games • iOS 26 Optimized</footer>

<script>
(() => {
    const firebaseConfig = { 
        apiKey: "AIzaSyByk8GJSoTJ_bgPNjyKnKi3o30E8bQB-qo",
        authDomain: "spinnerrealyt-games.firebaseapp.com",
        databaseURL: "https://spinnerrealyt-games-default-rtdb.europe-west1.firebasedatabase.app/" 
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();
    const loggedUser = localStorage.getItem("sp_logged");
    const syncEl = document.getElementById('sync-display');
    const pointsInfoEl = document.getElementById('points-info');

    let totalPoints = 0;

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const wrapper = document.getElementById('game-wrapper');
    const timerEl = document.getElementById('timer');
    const infoEl = document.getElementById('info');
    const progBar = document.getElementById('progress-bar');
    
    const popup = document.getElementById('in-game-popup');
    const popupTitle = document.getElementById('popup-title');
    const popupMsg = document.getElementById('popup-msg');
    const popupBtn = document.getElementById('popup-btn');

    auth.onAuthStateChanged((user) => {
        if(user && loggedUser) {
            document.getElementById('user-display').textContent = loggedUser.toUpperCase();
            loadData();
        } else if (loggedUser) {
            document.getElementById('user-display').textContent = loggedUser.toUpperCase();
            syncEl.textContent = "Connecting...";
        }
    });

    async function loadData() {
        if(!loggedUser) return;
        try {
            const snap = await db.ref('users/' + loggedUser + '/points').once('value');
            totalPoints = snap.exists() ? snap.val() : 0;
            pointsInfoEl.textContent = `Points: ${totalPoints}`;
            syncEl.textContent = "Synced";
            syncEl.style.color = "#4ade80";
        } catch(e) { syncEl.textContent = "Error"; }
    }

    async function savePoints(added) {
        if(!loggedUser || !auth.currentUser) return;
        totalPoints += added;
        pointsInfoEl.textContent = `Points: ${totalPoints}`;
        try {
            await db.ref('users/' + loggedUser).update({ points: totalPoints });
            syncEl.textContent = "Saved";
            syncEl.style.color = "#4ade80";
        } catch(e) { syncEl.textContent = "Sync Error"; }
    }

    function resizeCanvas() {
        canvas.width = wrapper.clientWidth;
        canvas.height = wrapper.clientHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // Stałe i zmienne silnika
    let gameActive = false;
    let animationId;
    let frameCount = 0;
    let difficulty = 1;
    const FPS = 60;
    const MAX_TIME = 60; // 60 sekund długości poziomu
    const SAFE_FRAMES = 3 * FPS; // Odliczanie 3 sekundy
    const GRID_SIZE = 30; // 30x30 to wymiar jednego bloku (kostki/kolca)

    // Fizyka i Przewijanie
    let scrollSpeed = 0;
    let groundY = 0;
    let totalDistance = 0;
    let distanceTraveled = 0;
    
    let player = {
        x: 80, y: 0, w: GRID_SIZE, h: GRID_SIZE,
        dy: 0, gravity: 0.9, jumpForce: -12.5,
        rotation: 0, isShip: false, isPressing: false,
        isGrounded: false
    };

    let obstacles = [];
    let particles = [];
    let shipStartDist = 0;
    let shipEndDist = 0;
    let hasShipSection = false;

    // Obsługa Sterowania (z jump buffering)
    function handleInput(e) {
        if(e.type !== 'keydown') e.preventDefault();
        if(e.type === 'keydown' && e.code !== 'Space') return;
        if (!gameActive) return;
        player.isPressing = true;
    }

    function handleInputEnd(e) {
        if(e.type !== 'keyup') e.preventDefault();
        if(e.type === 'keyup' && e.code !== 'Space') return;
        player.isPressing = false;
    }

    window.addEventListener('keydown', handleInput);
    window.addEventListener('keyup', handleInputEnd);
    wrapper.addEventListener('mousedown', handleInput);
    window.addEventListener('mouseup', handleInputEnd);
    wrapper.addEventListener('touchstart', handleInput, {passive: false});
    window.addEventListener('touchend', handleInputEnd);

    // --- GENERATOR MAPY (Proceduralny, jak prawdziwe GD) ---
    function generateLevel() {
        obstacles = [];
        totalDistance = MAX_TIME * FPS * scrollSpeed;
        
        hasShipSection = Math.random() < 0.20;
        if(hasShipSection) {
            shipStartDist = scrollSpeed * FPS * (Math.floor(Math.random() * 20) + 10); // miedzy 10s a 30s
            shipEndDist = shipStartDist + (20 * FPS * scrollSpeed); // Trwa 20s
            // Dodaj portale
            obstacles.push({ type: 'portal_ship', x: shipStartDist, y: 0, w: 20, h: canvas.height * 2 });
            obstacles.push({ type: 'portal_cube', x: shipEndDist, y: 0, w: 20, h: canvas.height * 2 });
        } else {
            shipStartDist = Infinity; shipEndDist = Infinity;
        }

        let cursorX = scrollSpeed * SAFE_FRAMES; // Zaczynamy budować po 3 sekundach
        
        while(cursorX < totalDistance) {
            let isShipArea = (cursorX >= shipStartDist && cursorX <= shipEndDist);
            
            if(isShipArea) {
                // Tryb statku: tworzymy jaskinię z klocków z góry i z dołu
                let gapHeight = Math.max(100, 200 - (difficulty * 30)); 
                let topH = Math.random() * (canvas.height - gapHeight - 40) + 20;
                
                // Zbuduj kolumnę bloków u góry
                for(let y = groundY - topH; y < groundY; y += GRID_SIZE) {
                    if(y < groundY - gapHeight - topH) {
                        obstacles.push({ type: 'block', x: cursorX, y: y, w: GRID_SIZE, h: GRID_SIZE, gridY: -1 }); // Top
                    } else if (y >= groundY - topH) {
                        obstacles.push({ type: 'block', x: cursorX, y: y, w: GRID_SIZE, h: GRID_SIZE, gridY: 0 }); // Bottom
                    }
                }
                cursorX += GRID_SIZE * 2; // Odstęp tunelu
            } else {
                // Tryb Kostki: Logiczne Chunki Platformowe
                let rand = Math.random();
                let chunkType = "spike_single";
                
                // Skalowanie trudności – ekstremalny ma trudniejsze struktury
                if (difficulty > 1.5 && rand < 0.2) chunkType = "triple_spike";
                else if (rand < 0.3) chunkType = "spike_double";
                else if (rand < 0.5) chunkType = "platform_jump";
                else if (rand < 0.7) chunkType = "stairs_up";
                else if (rand < 0.8) chunkType = "block_with_spike";
                else if (rand < 0.9) chunkType = "spike_single";
                else chunkType = "pit"; // Puste miejsce dla złapania tchu

                buildChunk(chunkType, cursorX);
                
                // Odstęp między chunkami zależy od prędkości i trudności
                let gap = (Math.random() * 2 + 2) * GRID_SIZE;
                if(difficulty > 2) gap -= GRID_SIZE; // ciaśniej na ekstremalnym
                cursorX += getChunkWidth(chunkType) + gap;
            }
        }
    }

    function addObj(type, realX, gridY) {
        obstacles.push({ 
            type: type, 
            x: realX, 
            y: groundY - GRID_SIZE - (gridY * GRID_SIZE), 
            w: GRID_SIZE, 
            h: GRID_SIZE 
        });
    }

    function buildChunk(type, startX) {
        switch(type) {
            case "spike_single":
                addObj('spike', startX, 0);
                break;
            case "spike_double":
                addObj('spike', startX, 0); addObj('spike', startX + GRID_SIZE, 0);
                break;
            case "triple_spike":
                addObj('spike', startX, 0); addObj('spike', startX + GRID_SIZE, 0); addObj('spike', startX + GRID_SIZE*2, 0);
                break;
            case "stairs_up":
                addObj('block', startX, 0);
                addObj('block', startX + GRID_SIZE, 0); addObj('block', startX + GRID_SIZE, 1);
                addObj('block', startX + GRID_SIZE*2, 0); addObj('block', startX + GRID_SIZE*2, 1); addObj('block', startX + GRID_SIZE*2, 2);
                break;
            case "platform_jump":
                // Blok w powietrzu
                addObj('block', startX, 1);
                addObj('block', startX + GRID_SIZE, 1);
                addObj('spike', startX + GRID_SIZE, 0); // kolec pod spodem
                addObj('block', startX + GRID_SIZE*2, 1);
                break;
            case "block_with_spike":
                // Blok z kolcem na nim
                addObj('block', startX, 0);
                addObj('spike', startX, 1);
                break;
            case "pit":
                // Pusto
                break;
        }
    }

    function getChunkWidth(type) {
        if(type === "spike_single" || type === "block_with_spike") return GRID_SIZE;
        if(type === "spike_double") return GRID_SIZE * 2;
        if(type === "triple_spike" || type === "stairs_up" || type === "platform_jump") return GRID_SIZE * 3;
        return 0; // pit
    }

    function startGame() {
        resizeCanvas();
        difficulty = parseFloat(document.getElementById('difficulty-select').value);
        scrollSpeed = 5 + (difficulty * 1.5); // np. Łatwy = 6.5, Ekstremalny = 8.75
        groundY = canvas.height - 25;
        
        player.y = groundY - player.h;
        player.dy = 0;
        player.rotation = 0;
        player.isShip = false;
        player.isPressing = false;
        player.isGrounded = true;
        
        particles = [];
        frameCount = 0;
        distanceTraveled = 0;
        gameActive = true;
        
        generateLevel();

        popup.style.display = 'none';
        infoEl.textContent = hasShipSection ? "Tryb: MIESZANY ✈️" : "Tryb: KOSTKA ⬛";
        infoEl.style.color = "#94a3b8";
        progBar.style.width = "0%";

        cancelAnimationFrame(animationId);
        gameLoop();
    }

    function showPopup(title, msg, color, showBtn) {
        gameActive = false;
        popupTitle.textContent = title;
        popupTitle.style.color = color;
        popupMsg.textContent = msg;
        popupBtn.style.display = showBtn ? 'block' : 'none';
        popup.style.display = 'flex';
    }

    function createParticles(x, y, color) {
        for(let i=0; i<20; i++) {
            particles.push({
                x: x + player.w/2, y: y + player.h/2,
                dx: (Math.random()-0.5)*12, dy: (Math.random()-0.5)*12,
                life: 30, color: color
            });
        }
    }

    function gameOver() {
        createParticles(player.x, player.y, "#f87171");
        showPopup("ROZBITY!", `Przetrwałeś: ${(frameCount/FPS).toFixed(1)}s`, "#ef4444", true);
    }

    function gameWin() {
        let pointsEarned = 0;
        if(difficulty === 1) pointsEarned = 1;
        if(difficulty === 1.5) pointsEarned = 2;
        if(difficulty === 2) pointsEarned = 3;
        if(difficulty === 2.5) pointsEarned = 5;

        savePoints(pointsEarned);
        showPopup("WYGRANA!", `Zaliczyłeś poziom na 100%! Zdobywasz +${pointsEarned} pkt.`, "#4ade80", true);
    }

    function gameLoop() {
        if (!gameActive) { draw(); return; }

        frameCount++;
        let currentSeconds = (frameCount / FPS).toFixed(1);
        timerEl.textContent = `⏱️ ${currentSeconds}s`;

        distanceTraveled += scrollSpeed;
        let progress = Math.min((distanceTraveled / totalDistance) * 100, 100);
        progBar.style.width = progress + "%";

        // Zwycięstwo
        if (progress >= 100) { gameWin(); return; }

        // Odliczanie startowe
        if (frameCount <= SAFE_FRAMES) {
            // Kostka sunie płasko
            player.rotation += 8 * difficulty;
            draw();
            animationId = requestAnimationFrame(gameLoop);
            return;
        }

        // Fizyka Gracza
        let nextY;
        if (player.isShip) {
            // Fizyka statku (grawitacja i ciąg)
            player.gravity = 0.35;
            if (player.isPressing) player.dy -= 0.7; // Ciąg w górę
            else player.dy += player.gravity; // Opadanie
            
            player.dy = Math.max(-6, Math.min(player.dy, 7)); // Terminal velocity
            nextY = player.y + player.dy;

            // Granice statku (sufit i podłoga)
            if (nextY < 0) { nextY = 0; player.dy = 0; }
            if (nextY > groundY - player.h) { gameOver(); return; }
            
            player.rotation = player.dy * 4; 
            player.isGrounded = false;
        } else {
            // Fizyka Kostki
            player.gravity = 0.9;
            player.dy += player.gravity;
            nextY = player.y + player.dy;

            // Grawitacja podłogi
            if (nextY >= groundY - player.h) {
                nextY = groundY - player.h;
                player.dy = 0;
                player.isGrounded = true;
                player.rotation = Math.round(player.rotation / 90) * 90;
            } else {
                player.isGrounded = false;
                player.rotation += 7 * difficulty;
            }

            // Jump Buffering (Auto-skok gdy wylądujemy z przytrzymaną Spacją)
            if (player.isGrounded && player.isPressing) {
                player.dy = player.jumpForce;
                player.isGrounded = false;
                nextY += player.dy;
            }
        }

        // Aktualizacja Przeszkód i Kolizje (Real GD Hitboxes)
        let crashed = false;

        for (let i = obstacles.length - 1; i >= 0; i--) {
            let obs = obstacles[i];
            obs.x -= scrollSpeed;

            // Optymalizacja – sprawdzamy tylko te blisko gracza
            if(obs.x + obs.w < player.x - 50 || obs.x > player.x + 100) continue;

            // PORTALE
            if(obs.type === 'portal_ship') {
                if(player.x + player.w/2 > obs.x) { player.isShip = true; player.dy = 0; obstacles.splice(i,1); }
            } else if(obs.type === 'portal_cube') {
                if(player.x + player.w/2 > obs.x) { player.isShip = false; player.rotation = 0; obstacles.splice(i,1); }
            }

            // KOLIZJA: SPRAWDZAMY KLOCKI (Solidne od góry)
            if(obs.type === 'block') {
                // Czy jest nachodzenie na osi X
                let overlapX = (player.x + player.w > obs.x + 2) && (player.x < obs.x + obs.w - 2);
                // Czy jest nachodzenie na osi Y
                let overlapY = (nextY + player.h > obs.y + 2) && (nextY < obs.y + obs.h - 2);

                if (overlapX && overlapY) {
                    // LĄDOWANIE (Top collision)
                    // Jeśli gracz w poprzedniej klatce był wyżej (lub na równi) z wierzchem klocka
                    if (!player.isShip && player.y + player.h <= obs.y + Math.abs(player.dy) + 2) {
                        nextY = obs.y - player.h; // Ustaw na górze
                        player.dy = 0;
                        player.isGrounded = true;
                        player.rotation = Math.round(player.rotation / 90) * 90;
                    } else {
                        // CRASH (boczny lub uderzenie głową)
                        crashed = true;
                        break;
                    }
                }
            }

            // KOLIZJA: SPRAWDZAMY KOLCE (Ostre Hitboxy wewnątrz)
            if(obs.type === 'spike') {
                // Zacieśniony, uczciwy hitbox kolca (obejmuje węższy trójkąt, nie pełen kwadrat)
                let sHit = { x: obs.x + 8, y: obs.y + 12, w: 14, h: 18 };
                if (player.x + player.w > sHit.x && player.x < sHit.x + sHit.w &&
                    nextY + player.h > sHit.y && nextY < sHit.y + sHit.h) {
                    crashed = true;
                    break;
                }
            }
        }

        if (crashed) { gameOver(); return; }

        player.y = nextY;
        
        // Czyszczenie obiektów, które minęły
        obstacles = obstacles.filter(o => o.x + o.w > -100);

        draw();
        animationId = requestAnimationFrame(gameLoop);
    }

    function draw() {
        ctx.fillStyle = '#0f172a';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Grid w tle
        ctx.strokeStyle = 'rgba(255,255,255,0.03)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        for(let i=0; i<canvas.width; i+=GRID_SIZE) { ctx.moveTo(i, 0); ctx.lineTo(i, groundY); }
        for(let i=0; i<groundY; i+=GRID_SIZE) { ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); }
        ctx.stroke();

        // Podłoże
        ctx.fillStyle = '#1e293b';
        ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);
        ctx.strokeStyle = '#38bdf8';
        ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(0, groundY); ctx.lineTo(canvas.width, groundY); ctx.stroke();

        // Rysowanie Przeszkód
        obstacles.forEach(obs => {
            if (obs.type === 'spike') {
                ctx.fillStyle = '#ef4444'; // Red
                ctx.beginPath();
                ctx.moveTo(obs.x, obs.y + obs.h);
                ctx.lineTo(obs.x + obs.w / 2, obs.y);
                ctx.lineTo(obs.x + obs.w, obs.y + obs.h);
                ctx.fill();
                // Subtelne ostre światło wewnątrz
                ctx.fillStyle = '#fca5a5';
                ctx.beginPath(); ctx.moveTo(obs.x+8, obs.y+obs.h); ctx.lineTo(obs.x+obs.w/2, obs.y+10); ctx.lineTo(obs.x+obs.w-8, obs.y+obs.h); ctx.fill();
            } else if (obs.type === 'block') {
                ctx.fillStyle = '#020617';
                ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
                ctx.strokeStyle = '#38bdf8';
                ctx.lineWidth = 2;
                ctx.strokeRect(obs.x+1, obs.y+1, obs.w-2, obs.h-2);
                // Detal kwadratu w środku
                ctx.strokeStyle = 'rgba(56, 189, 248, 0.3)';
                ctx.strokeRect(obs.x+8, obs.y+8, obs.w-16, obs.h-16);
            } else if (obs.type === 'portal_ship') {
                ctx.fillStyle = 'rgba(217, 70, 239, 0.4)'; // Portal różowy
                ctx.fillRect(obs.x, 0, 10, canvas.height);
                ctx.shadowBlur = 15; ctx.shadowColor = '#d946ef'; ctx.fillRect(obs.x+3, 0, 4, canvas.height); ctx.shadowBlur = 0;
            } else if (obs.type === 'portal_cube') {
                ctx.fillStyle = 'rgba(74, 222, 128, 0.4)'; // Portal zielony
                ctx.fillRect(obs.x, 0, 10, canvas.height);
                ctx.shadowBlur = 15; ctx.shadowColor = '#4ade80'; ctx.fillRect(obs.x+3, 0, 4, canvas.height); ctx.shadowBlur = 0;
            }
        });

        // Ostrzeżenie / Odliczanie przed startem (3 sekundy)
        if(gameActive && frameCount <= SAFE_FRAMES) {
            let leftSec = ((SAFE_FRAMES - frameCount)/FPS).toFixed(1);
            ctx.fillStyle = 'rgba(255,255,255,0.6)';
            ctx.font = '900 30px Inter';
            ctx.textAlign = 'center';
            if(leftSec > 0.0) ctx.fillText(`START ZA: ${leftSec}s`, canvas.width/2, canvas.height/2);
        }

        // Rysowanie Gracza
        if(gameActive) {
            ctx.save();
            ctx.translate(player.x + player.w / 2, player.y + player.h / 2);
            ctx.rotate(player.rotation * Math.PI / 180);
            
            if (player.isShip) {
                ctx.fillStyle = '#facc15';
                ctx.shadowBlur = 10; ctx.shadowColor = '#facc15';
                ctx.beginPath();
                ctx.moveTo(-12, -6); ctx.lineTo(12, 0); ctx.lineTo(-12, 6);
                ctx.closePath(); ctx.fill();
            } else {
                ctx.fillStyle = '#38bdf8';
                ctx.shadowBlur = 10; ctx.shadowColor = '#38bdf8';
                ctx.fillRect(-player.w / 2, -player.h / 2, player.w, player.h);
                ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
                ctx.strokeRect(-player.w / 2, -player.h / 2, player.w, player.h);
            }
            ctx.restore();
        }

        // Cząsteczki
        particles.forEach((p, i) => {
            p.x += p.dx; p.y += p.dy; p.life--;
            ctx.fillStyle = p.color;
            ctx.globalAlpha = Math.max(0, p.life / 30);
            ctx.fillRect(p.x, p.y, 4, 4);
            if(p.life <= 0) particles.splice(i, 1);
        });
        ctx.globalAlpha = 1;
    }

    document.getElementById('start-btn').addEventListener('click', startGame);
    popupBtn.addEventListener('click', startGame);

    draw();
})();
</script>
</body>
</html>
