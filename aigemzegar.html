<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gemini Watch AI</title>
    <style>
        :root {
            --bg-color: #000000;
            --user-bubble: #007AFF;
            --ai-bubble: #262626;
            --text-color: #ffffff;
            --accent-color: #34C759;
            --font-main: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        #header {
            padding: 8px;
            text-align: center;
            font-size: 11px;
            background: #111;
            border-bottom: 1px solid #333;
        }

        #user-nick-display { color: var(--accent-color); font-weight: bold; }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            scrollbar-width: none;
        }

        #chat-container::-webkit-scrollbar { display: none; }

        .message {
            max-width: 85%;
            padding: 8px 12px;
            border-radius: 14px;
            font-size: 14px;
            line-height: 1.3;
            word-wrap: break-word;
        }

        .user { align-self: flex-end; background-color: var(--user-bubble); border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background-color: var(--ai-bubble); border-bottom-left-radius: 2px; }
        .error { align-self: center; background: #441111; color: #ff9999; font-size: 11px; border-radius: 5px; }

        /* Drążek sterowania */
        #joystick-zone {
            position: fixed;
            right: 8px;
            top: 40%;
            width: 44px;
            height: 100px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        #joystick-knob {
            width: 32px;
            height: 32px;
            background: var(--accent-color);
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        #controls {
            padding: 8px;
            background: #111;
            display: flex;
            gap: 5px;
            border-top: 1px solid #333;
        }

        #user-input {
            flex: 1;
            background: #222;
            border: 1px solid #444;
            color: white;
            padding: 8px;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
        }

        #send-btn {
            background: var(--user-bubble);
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            font-weight: bold;
        }

        .loader { font-size: 10px; color: #666; padding: 5px; }
    </style>
</head>
<body>

    <div id="header">Nick: <span id="user-nick-display">...</span></div>

    <div id="chat-container">
        <div class="message ai">Cześć! Spróbujmy jeszcze raz. Wpisz coś poniżej.</div>
    </div>

    <div id="joystick-zone">
        <div id="joystick-knob"></div>
    </div>

    <div id="controls">
        <input type="text" id="user-input" placeholder="Halo?" autocomplete="off">
        <button id="send-btn">OK</button>
    </div>

    <script>
        // TWOJE API
        const API_KEY = 'AIzaSyCVE1PCYhvHzzXVsXpQ7b3HblKBk5Un-V8';
        const API_URL = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent';

        let nickname = prompt("Nick:", "Użytkownik") || "Użytkownik";
        document.getElementById('user-nick-display').innerText = nickname;

        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const knob = document.getElementById('joystick-knob');

        function addMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender}`;
            msgDiv.innerText = text;
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            addMessage(text, 'user');
            userInput.value = '';

            const loader = document.createElement('div');
            loader.className = 'loader';
            loader.innerText = 'Łączenie z Gemini...';
            chatContainer.appendChild(loader);

            try {
                const response = await fetch(`${API_URL}?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: text }] }]
                    })
                });

                const data = await response.json();
                loader.remove();

                if (data.error) {
                    addMessage("Błąd API: " + data.error.message, 'error');
                } else if (data.candidates && data.candidates[0].content) {
                    const aiResponse = data.candidates[0].content.parts[0].text;
                    addMessage(aiResponse, 'ai');
                } else {
                    addMessage("Otrzymano pustą odpowiedź.", 'error');
                }
            } catch (error) {
                if(loader) loader.remove();
                addMessage("Błąd sieci: " + error.message, 'error');
            }
        }

        // JOYSTICK
        let isDragging = false;
        let startY = 0;
        knob.addEventListener('touchstart', (e) => { isDragging = true; startY = e.touches[0].clientY; e.preventDefault(); });
        window.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            const deltaY = e.touches[0].clientY - startY;
            const moveY = Math.max(Math.min(deltaY, 30), -30);
            knob.style.transform = `translateY(${moveY}px)`;
            chatContainer.scrollTop += moveY * 2;
        }, { passive: false });
        window.addEventListener('touchend', () => { isDragging = false; knob.style.transform = `translateY(0px)`; });

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>
