<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gemini Watch AI - Final</title>
    <style>
        :root {
            --bg-color: #000000;
            --user-bubble: #007AFF;
            --ai-bubble: #1C1C1E;
            --text-color: #ffffff;
            --accent-color: #34C759;
            --font-main: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        #header {
            padding: 8px;
            text-align: center;
            font-size: 11px;
            background: #111;
            border-bottom: 1px solid #333;
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            scrollbar-width: none;
        }

        #chat-container::-webkit-scrollbar { display: none; }

        .message {
            max-width: 85%;
            padding: 8px 12px;
            border-radius: 14px;
            font-size: 14px;
            line-height: 1.4;
        }

        .user { align-self: flex-end; background-color: var(--user-bubble); border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background-color: var(--ai-bubble); border-bottom-left-radius: 2px; }
        .error { align-self: center; background: #3d0000; color: #ffbaba; font-size: 11px; padding: 6px; border-radius: 6px; text-align: center; margin: 5px; }

        /* Drążek sterowania */
        #joystick-zone {
            position: fixed;
            right: 10px;
            top: 40%;
            width: 45px;
            height: 100px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        #joystick-knob {
            width: 32px;
            height: 32px;
            background: var(--accent-color);
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        #controls {
            padding: 10px;
            background: #111;
            display: flex;
            gap: 8px;
            border-top: 1px solid #333;
        }

        input {
            flex: 1;
            background: #222;
            border: 1px solid #444;
            color: white;
            padding: 10px;
            border-radius: 10px;
            font-size: 14px;
            outline: none;
        }

        button {
            background: var(--user-bubble);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="header">Nick: <span id="user-nick-display" style="color: var(--accent-color);">...</span></div>

    <div id="chat-container">
        <div class="message ai">Cześć! Wprowadziłem poprawki dla Twojego klucza. Spróbuj teraz zapytać o cokolwiek!</div>
    </div>

    <div id="joystick-zone">
        <div id="joystick-knob"></div>
    </div>

    <div id="controls">
        <input type="text" id="user-input" placeholder="Zadaj pytanie..." autocomplete="off">
        <button id="send-btn">OK</button>
    </div>

    <script>
        // TWOJE NOWE DANE
        const API_KEY = 'AIzaSyDpJ6AnfxTpBkCrePyl0lP8hMbjqGp3pdA';
        // ZMIANA: Dokładna nazwa modelu gemini-1.5-pro
        const API_URL = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro:generateContent';

        let nickname = prompt("Podaj swój nick:", "Tester") || "Tester";
        document.getElementById('user-nick-display').innerText = nickname;

        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const knob = document.getElementById('joystick-knob');

        function addMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender}`;
            msgDiv.innerText = text;
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            addMessage(text, 'user');
            userInput.value = '';

            try {
                const response = await fetch(`${API_URL}?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: text }] }]
                    })
                });

                const data = await response.json();

                if (data.error) {
                    addMessage("Błąd: " + data.error.message, 'error');
                    console.log("Szczegóły błędu:", data.error);
                } else if (data.candidates && data.candidates[0].content) {
                    addMessage(data.candidates[0].content.parts[0].text, 'ai');
                } else {
                    addMessage("Nieoczekiwany format danych z API.", 'error');
                }
            } catch (error) {
                addMessage("Błąd sieci: " + error.message, 'error');
            }
        }

        // OBSŁUGA DRĄŻKA (JOYSTICKA)
        let isDragging = false;
        let startY = 0;
        knob.addEventListener('touchstart', (e) => { 
            isDragging = true; 
            startY = e.touches[0].clientY; 
            e.preventDefault(); 
        });

        window.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            const currentY = e.touches[0].clientY;
            const deltaY = currentY - startY;
            const moveY = Math.max(Math.min(deltaY, 35), -35);
            
            knob.style.transform = `translateY(${moveY}px)`;
            // Przewijanie listy czatu
            chatContainer.scrollTop += moveY * 2;
            
            e.preventDefault();
        }, { passive: false });

        window.addEventListener('touchend', () => { 
            isDragging = false; 
            knob.style.transform = `translateY(0px)`; 
        });

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>
