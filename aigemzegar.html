<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gemini Watch AI - Final Fix</title>
    <style>
        :root {
            --bg-color: #000000;
            --user-bubble: #007AFF;
            --ai-bubble: #1C1C1E;
            --text-color: #ffffff;
            --accent-color: #34C759;
            --font-main: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        /* Wygląd zoptymalizowany pod Apple Watch */
        #header {
            padding: 6px;
            text-align: center;
            font-size: 10px;
            background: #111;
            border-bottom: 1px solid #333;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            scrollbar-width: none;
        }

        #chat-container::-webkit-scrollbar { display: none; }

        .message {
            max-width: 88%;
            padding: 6px 10px;
            border-radius: 12px;
            font-size: 13px;
            line-height: 1.3;
        }

        .user { align-self: flex-end; background-color: var(--user-bubble); color: white; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background-color: var(--ai-bubble); color: #e5e5e5; border-bottom-left-radius: 2px; }
        .error { align-self: center; background: #3d0000; color: #ffbaba; font-size: 10px; padding: 4px; border-radius: 4px; border: 1px solid #ff0000; }

        /* Drążek sterowania - mniejszy i bardziej dyskretny */
        #joystick-zone {
            position: fixed;
            right: 6px;
            top: 35%;
            width: 38px;
            height: 90px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        #joystick-knob {
            width: 28px;
            height: 28px;
            background: var(--accent-color);
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(0,0,0,0.6);
        }

        #controls {
            padding: 6px;
            background: #000;
            display: flex;
            gap: 4px;
            border-top: 1px solid #222;
        }

        input {
            flex: 1;
            background: #1c1c1e;
            border: 1px solid #3a3a3c;
            color: white;
            padding: 8px;
            border-radius: 8px;
            font-size: 13px;
            outline: none;
        }

        button {
            background: var(--user-bubble);
            color: white;
            border: none;
            padding: 0 12px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <div id="header">User: <span id="user-nick-display" style="color: var(--accent-color);">...</span></div>

    <div id="chat-container">
        <div class="message ai">System gotowy. Jeśli znów wystąpi błąd, sprawdzimy listę Twoich modeli.</div>
    </div>

    <div id="joystick-zone">
        <div id="joystick-knob"></div>
    </div>

    <div id="controls">
        <input type="text" id="user-input" placeholder="Zadaj pytanie..." autocomplete="off">
        <button id="send-btn">SEND</button>
    </div>

    <script>
        // TWOJE KLUCZE
        const API_KEY = 'AIzaSyCVE1PCYhvHzzXVsXpQ7b3HblKBk5Un-V8';
        // ZMIANA: v1beta i model gemini-pro (najbardziej kompatybilny)
        const API_URL = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent';

        let nickname = prompt("Nick:", "Gracz") || "Gracz";
        document.getElementById('user-nick-display').innerText = nickname;

        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const knob = document.getElementById('joystick-knob');

        function addMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender}`;
            msgDiv.innerText = text;
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            addMessage(text, 'user');
            userInput.value = '';

            try {
                const response = await fetch(`${API_URL}?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: text }] }]
                    })
                });

                const data = await response.json();

                if (data.error) {
                    // Jeśli nadal błąd, wyświetlamy go szczegółowo
                    addMessage("Błąd: " + data.error.message, 'error');
                } else if (data.candidates && data.candidates[0].content) {
                    addMessage(data.candidates[0].content.parts[0].text, 'ai');
                } else {
                    addMessage("Problem z formatem danych.", 'error');
                }
            } catch (error) {
                addMessage("Błąd sieci: " + error.message, 'error');
            }
        }

        // JOYSTICK LOGIC
        let isDragging = false;
        let startY = 0;
        knob.addEventListener('touchstart', (e) => { isDragging = true; startY = e.touches[0].clientY; e.preventDefault(); });
        window.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            const deltaY = e.touches[0].clientY - startY;
            const moveY = Math.max(Math.min(deltaY, 25), -25);
            knob.style.transform = `translateY(${moveY}px)`;
            chatContainer.scrollTop += moveY * 3;
        }, { passive: false });
        window.addEventListener('touchend', () => { isDragging = false; knob.style.transform = `translateY(0px)`; });

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>
